<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מדדי מכירות</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0f2f7;--white:#fff;--s2:#f7f8fc;--s3:#eef0f6;
  --border:#e2e6f0;--border2:#cbd1e2;
  --text:#1a1f2e;--t2:#5a6480;--t3:#9aa0b8;
  --blue:#2563eb;--blue-lt:#eff4ff;--blue-md:#bfcfff;
  --green:#059669;--green-lt:#ecfdf5;--green-md:#a7f3d0;
  --red:#dc2626;--red-lt:#fef2f2;--red-md:#fecaca;
  --amber:#d97706;--amber-lt:#fffbeb;--amber-md:#fde68a;
  --purple:#7c3aed;--purple-lt:#f5f3ff;--purple-md:#ddd6fe;
  --r:12px;--rsm:8px;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;}
nav{position:sticky;top:0;z-index:300;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--shadow);display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:62px;}
.nav-brand{display:flex;align-items:center;gap:10px;}
.nav-icon{width:34px;height:34px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(37,99,235,.35);}
.nav-title{font-size:17px;font-weight:800;letter-spacing:-.4px;}
.nav-sub{font-size:12px;color:var(--t3);margin-right:4px;font-weight:500;}
.nav-tabs{display:flex;gap:2px;background:var(--s3);border-radius:10px;padding:3px;}
.ntab{padding:7px 18px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent;color:var(--t2);font-family:'Heebo',sans-serif;transition:all .18s;}
.ntab.on{background:var(--white);color:var(--blue);box-shadow:var(--shadow);}
.ntab:hover:not(.on){background:rgba(255,255,255,.6);color:var(--text);}
.nav-date{font-size:12px;color:var(--t3);font-weight:500;}
.month-wrap{background:var(--white);border-bottom:1px solid var(--border);padding:12px 32px;}
.month-strip{display:flex;gap:6px;flex-wrap:wrap;}
.mbtn{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:transparent;color:var(--t2);font-family:'Heebo',sans-serif;transition:all .15s;}
.mbtn.on{background:var(--blue);border-color:var(--blue);color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.mbtn:hover:not(.on){border-color:var(--blue);color:var(--blue);}
.main{padding:24px 32px;max-width:1600px;margin:0 auto;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:20px;box-shadow:var(--shadow);}
.card-hdr{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.card-title{font-size:14px;font-weight:800;color:var(--text);}
.badge{font-size:11px;padding:4px 11px;border-radius:20px;font-weight:700;}
.bb{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md);}
.bg{background:var(--green-lt);color:var(--green);border:1px solid var(--green-md);}
.ba{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-md);}
.bp{background:var(--purple-lt);color:var(--purple);border:1px solid var(--purple-md);}
.kpi-strip{display:grid;}
.kpi-cell{padding:20px 18px;text-align:center;border-left:1px solid var(--border);}
.kpi-cell:last-child{border-left:none;}
.kl{font-size:11px;color:var(--t3);font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;line-height:1.4;}
.kv{font-size:26px;font-weight:900;line-height:1;letter-spacing:-.5px;}
.kv.blue{color:var(--blue);}.kv.green{color:var(--green);}.kv.red{color:var(--red);}.kv.amber{color:var(--amber);}.kv.purple{color:var(--purple);}
.ks{font-size:11px;color:var(--t3);margin-top:5px;font-weight:500;}
.form-body{padding:20px 22px;}
.rep-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
.rlbl{font-size:12px;color:var(--t2);font-weight:700;flex-shrink:0;}
.rbtn{padding:6px 15px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--border2);background:var(--s2);color:var(--t2);font-family:'Heebo',sans-serif;transition:all .13s;}
.rbtn.on{background:var(--blue);border-color:var(--blue);color:#fff;}
.rbtn:hover:not(.on){border-color:var(--blue);color:var(--blue);background:var(--blue-lt);}
.rbtn-add{border-style:dashed;color:var(--t3);background:transparent;}
.rbtn-add:hover{color:var(--blue);border-color:var(--blue);background:var(--blue-lt);}
.ig{display:flex;flex-direction:column;gap:6px;}
.ig label{font-size:11px;color:var(--t2);font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.ifield{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:10px 12px;font-size:14px;font-weight:700;color:var(--text);font-family:'Heebo',sans-serif;transition:all .15s;text-align:center;width:100%;}
.ifield:focus{outline:none;border-color:var(--blue);background:var(--white);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
.ifield::placeholder{color:var(--t3);font-weight:400;font-size:13px;}
.ifield.date-f{text-align:right;font-size:13px;font-weight:600;}
.fields-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:10px;margin-bottom:16px;}
.form-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.btn-pri{background:var(--blue);color:#fff;border:none;padding:11px 28px;border-radius:var(--rsm);font-size:14px;font-weight:800;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;box-shadow:0 2px 8px rgba(37,99,235,.3);}
.btn-pri:hover{background:#1d50c8;}.btn-pri:active{transform:scale(.98);}
.btn-sec{background:var(--s2);color:var(--t2);border:1.5px solid var(--border);padding:11px 18px;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;font-family:'Heebo',sans-serif;transition:all .15s;}
.btn-sec:hover{border-color:var(--border2);color:var(--text);background:var(--s3);}
.ok-msg{font-size:13px;color:var(--green);font-weight:700;opacity:0;transition:opacity .3s;}
.ok-msg.show{opacity:1;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{padding:11px 14px;text-align:right;font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;background:var(--s2);border-bottom:2px solid var(--border);white-space:nowrap;}
thead th.c{text-align:center;}
thead th.grp-leads{border-bottom:2px solid var(--blue-md);color:var(--blue);}
thead th.grp-close{border-bottom:2px solid var(--green-md);color:var(--green);}
thead th.grp-conv{border-bottom:2px solid var(--amber-md);color:var(--amber);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--s2);}
tbody tr.tot{background:#f0f4ff;border-top:2px solid var(--blue-md);}
tbody tr.tot:hover{background:#e8eeff;}
tbody td{padding:11px 14px;font-size:13px;color:var(--text);white-space:nowrap;}
td.c{text-align:center;}
td.rname{font-weight:800;font-size:14px;}
td.tot-name{font-weight:800;font-size:13px;color:var(--blue);}
.pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:800;}
.pg{background:var(--green-lt);color:var(--green);border:1px solid var(--green-md);}
.pa{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-md);}
.pr{background:var(--red-lt);color:var(--red);border:1px solid var(--red-md);}
.pct-hi{color:var(--green);font-weight:800;}.pct-mid{color:var(--amber);font-weight:800;}.pct-lo{color:var(--red);font-weight:800;}
.del{background:transparent;border:1px solid transparent;color:var(--t3);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:6px;transition:all .13s;font-family:'Heebo',sans-serif;}
.del:hover{color:var(--red);background:var(--red-lt);border-color:var(--red-md);}
.goals-grid{display:grid;grid-template-columns:130px repeat(8,1fr);border-top:1px solid var(--border);}
.gcell{padding:13px 16px;border-left:1px solid var(--border);border-bottom:1px solid var(--border);}
.gcell:nth-child(9n){border-left:none;}
.gcell.ghdr{background:var(--s2);font-size:11px;font-weight:800;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;}
.gcell.grname{font-weight:800;font-size:14px;display:flex;align-items:center;}
.g-in{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);padding:7px 10px;font-size:13px;font-weight:700;color:var(--text);font-family:'Heebo',sans-serif;width:100%;text-align:center;transition:all .15s;}
.g-in:focus{outline:none;border-color:var(--blue);background:var(--white);}
.g-status{font-size:12px;font-weight:800;margin-top:5px;}
.gs-hit{color:var(--green);}.gs-miss{color:var(--red);}.gs-none{color:var(--t3);}
.conv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;padding:20px 22px;}
.conv-card{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;transition:box-shadow .15s,transform .15s;}
.conv-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.conv-rep-name{font-size:15px;font-weight:900;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid var(--border);}
.conv-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px;}
.conv-row:last-child{border-bottom:none;}
.conv-lbl{color:var(--t2);font-weight:600;}.conv-val{font-weight:800;font-size:13px;}
.date-badge{display:inline-flex;flex-direction:column;align-items:center;padding:4px 8px;border-radius:7px;background:var(--blue-lt);border:1px solid var(--blue-md);}
.date-week{font-size:10px;font-weight:700;color:var(--blue);}.date-day{font-size:12px;font-weight:800;color:var(--text);}
.grp-hdr-row th{background:var(--s3);font-size:10px;font-weight:800;text-align:center;color:var(--t2);letter-spacing:.06em;padding:6px 8px;border-bottom:1px solid var(--border);}
.grp-hdr-row th.gh-leads{background:#eff4ff;color:var(--blue);}.grp-hdr-row th.gh-close{background:#ecfdf5;color:var(--green);}.grp-hdr-row th.gh-conv{background:#fffbeb;color:var(--amber);}
.dt-full{background:var(--green-lt);color:var(--green);border:1px solid var(--green-md);}
.dt-reserve{background:var(--amber-lt);color:var(--amber);border:1px solid var(--amber-md);}
.dt-complete{background:var(--blue-lt);color:var(--blue);border:1px solid var(--blue-md);}
.dt-cancel{background:var(--red-lt);color:var(--red);border:1px solid var(--red-md);}
.dt-other{background:#f3f4f6;color:#6b7280;border:1px solid #d1d5db;}
.deal-type-pill{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;}
.pay-chip{font-size:11px;color:var(--t2);background:var(--s3);border-radius:6px;padding:2px 7px;}
.rep-summary-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:20px 22px;}
.rep-sum-card{background:var(--s2);border:1.5px solid var(--border);border-radius:var(--r);padding:16px;}
.rep-sum-name{font-size:15px;font-weight:900;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--border);}
.rep-sum-row{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid var(--border);}
.rep-sum-row:last-child{border-bottom:none;}
.rep-sum-lbl{color:var(--t2);font-weight:600;}.rep-sum-val{font-weight:800;}
.filter-bar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.fsel{background:var(--s2);border:1.5px solid var(--border);color:var(--t2);padding:6px 12px;border-radius:var(--rsm);font-family:'Heebo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;}
.fsel:focus{outline:none;border-color:var(--blue);}
.total-item{display:flex;flex-direction:column;gap:2px;}
.total-lbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;}
.total-val{font-size:18px;font-weight:900;}
.empty-state{text-align:center;padding:48px 24px;color:var(--t3);font-size:14px;font-weight:500;}
.empty-state strong{display:block;font-size:18px;margin-bottom:6px;color:var(--t2);}
@media(max-width:1200px){.fields-grid{grid-template-columns:repeat(5,1fr);}.kpi-strip{grid-template-columns:repeat(5,1fr)!important;}}
@media(max-width:750px){.main{padding:14px 16px;}nav{padding:0 16px;}.month-wrap{padding:10px 16px;}.fields-grid{grid-template-columns:repeat(3,1fr);}.nav-date{display:none;}.two-col{grid-template-columns:1fr;}.goals-grid{grid-template-columns:130px repeat(2,1fr);}.conv-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>

<script>
// ── GOOGLE SHEETS SYNC ──────────────────────────────────────────────
window.GS_URL = localStorage.getItem('gs_url') || '';
window.GS_ENABLED = !!window.GS_URL;

window.gsSetUrl = function(url){
  url=(url||'').trim();
  localStorage.setItem('gs_url',url);
  window.GS_URL=url; window.GS_ENABLED=!!url;
  var ind=document.getElementById('gs-ind');
  if(!url){if(ind)ind.textContent='לא מחובר';return;}
  window.gsSyncAll();
};

window.gsSet = function(key,value){
  if(!window.GS_ENABLED)return;
  var url=window.GS_URL+'?action=set&key='+encodeURIComponent(key)+'&value='+encodeURIComponent(value);
  fetch(url).catch(function(){});
};

window.gsSyncAll = function(){
  if(!window.GS_ENABLED)return;
  var ind=document.getElementById('gs-ind');
  if(ind){ind.textContent='מסנכרן...';ind.style.color='#d97706';}
  fetch(window.GS_URL+'?action=getall')
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.ok||!d.data)return;
      var keys=['sm4_months','sm4_data','sm4_reps','sm4_goals','sm4_sales5','sm4_bonuses','debtors1','sal_conf5','c9'];
      keys.forEach(function(k){
        if(d.data[k]!=null&&d.data[k]!=='')localStorage.setItem(k,d.data[k]);
      });
      months=ld(SK.months,DEFAULT_MONTHS);
      entries=ld(SK.data,[]);reps=ld(SK.reps,DEFAULT_REPS);

function today(){return new Date().toISOString().split('T')[0];}
function weekNum(ds){var d=new Date(ds);return Math.min(Math.floor((d.getDate()-1)/7)+1,5);}
function fmt(n){return (+n||0).toLocaleString('he-IL');}
function pct(n,d){return d>0?Math.round(n/d*100):0;}
function pctS(n,d){return d>0?Math.round(n/d*100)+'%':'—';}
function avgDeal(a){return a.close>0?Math.round(a.rev/a.close):0;}
function allLeads(a){return a.leads+a.train+a.data;}
function cc(v){return v>=30?'pct-hi':v>=15?'pct-mid':'pct-lo';}
function pc(c){return c>=3?'pg':c>=1?'pa':'pr';}

// ── AGG ──────────────────────────────────────────────────────────────
var Z={leads:0,rel:0,train:0,data:0,calls:0,full:0,air:0,close:0,rev:0,cancel:0};
function agg(arr){
  return arr.reduce(function(a,e){
    return{leads:a.leads+e.leads,rel:a.rel+e.rel,train:a.train+e.train,
      data:a.data+e.data,calls:a.calls+e.calls,full:a.full+e.full,
      air:a.air+e.air,close:a.close+e.close,rev:a.rev+e.rev,cancel:a.cancel+e.cancel};
  },Object.assign({},Z));
}

// ── SAVE ENTRY ───────────────────────────────────────────────────────
function saveEntry(){
  var date=document.getElementById('f-date').value;
  if(!date){alert('\u05d1\u05d7\u05e8 \u05ea\u05d0\u05e8\u05d9\u05da');return;}
  entries.push({id:Date.now(),month:curMonth,date:date,week:weekNum(date),rep:curRep,
    leads:+document.getElementById('f-leads').value||0,
    rel:+document.getElementById('f-rel').value||0,
    train:+document.getElementById('f-train').value||0,
    data:+document.getElementById('f-data').value||0,
    calls:+document.getElementById('f-calls').value||0,
    full:+document.getElementById('f-full').value||0,
    air:+document.getElementById('f-air').value||0,
    close:+document.getElementById('f-close').value||0,
    rev:+document.getElementById('f-rev').value||0,
    cancel:+document.getElementById('f-cancel').value||0});
  persist();clearForm();
  var ok=document.getElementById('ok-msg');
  ok.classList.add('show');setTimeout(function(){ok.classList.remove('show');},2500);
  // Switch to daily tab to show results
  if(curTab!=='daily'){
    curTab='daily';
    document.querySelectorAll('.ntab').forEach(function(b){b.classList.remove('on');});
    document.querySelectorAll('.ntab').forEach(function(b){
      if(b.getAttribute('onclick')&&b.getAttribute('onclick').indexOf("'daily'")>-1)b.classList.add('on');
    });
    var dc=document.getElementById('daily-input-card');
    if(dc)dc.style.display='';
  }
  renderAll();
}
function clearForm(){
  ['f-leads','f-rel','f-train','f-data','f-calls','f-full','f-air','f-close','f-rev','f-cancel']
    .forEach(function(id){document.getElementById(id).value='';});
}
function delEntry(id){entries=entries.filter(function(e){return e.id!==id;});persist();renderAll();}

// ── RENDER ALL ───────────────────────────────────────────────────────
function renderAll(){
  // Always make sure the view div is visible
  var vw=document.getElementById('view');
  if(vw) vw.style.display='';

  if(curTab==='sales')  {renderSales();  return;}
  if(curTab==='bonuses'){renderBonuses();return;}
  if(curTab==='salary') {renderSalary(); return;}
  if(curTab==='contest'){renderContest();return;}
  if(curTab==='debtors'){renderDebtors();return;}
  var md=entries.filter(function(e){return e.month===curMonth;});
  if(curTab==='daily')        renderDaily(md);
  else if(curTab==='weekly')  renderWeekly(md);
  else if(curTab==='monthly') renderMonthly(md);
  else                        renderConv(md);
}

// ── WORK DAYS ──────────────────────────────────────────────────────────
function workDaysInMonth(ms) {
  const HE={'ינואר':0,'פברואר':1,'מרץ':2,'אפריל':3,'מאי':4,'יוני':5,'יולי':6,'אוגוסט':7,'ספטמבר':8,'אוקטובר':9,'נובמבר':10,'דצמבר':11};
  const p=ms.split(' '), m=HE[p[0]], y=p[1]?2000+parseInt(p[1]):new Date().getFullYear();
  if(m===undefined)return 22;
  let c=0; for(let d=1;d<=new Date(y,m+1,0).getDate();d++){const dw=new Date(y,m,d).getDay();if(dw!==5&&dw!==6)c++;}
  return c;
}
function workDaysPassed(ms) {
  const HE={'ינואר':0,'פברואר':1,'מרץ':2,'אפריל':3,'מאי':4,'יוני':5,'יולי':6,'אוגוסט':7,'ספטמבר':8,'אוקטובר':9,'נובמבר':10,'דצמבר':11};
  const p=ms.split(' '), m=HE[p[0]], y=p[1]?2000+parseInt(p[1]):new Date().getFullYear();
  if(m===undefined)return 0;
  const now=new Date(),cy=now.getFullYear(),cm=now.getMonth();
  if(y>cy||(y===cy&&m>cm))return 0;
  const end=(y===cy&&m===cm)?now.getDate():new Date(y,m+1,0).getDate();
  let c=0; for(let d=1;d<=end;d++){const dw=new Date(y,m,d).getDay();if(dw!==5&&dw!==6)c++;}
  return c;
}

// ── RENDER SALES ───────────────────────────────────────────────────────
function renderSales() {
  const filterRep  = document.getElementById('sf-rep')  ? document.getElementById('sf-rep').value  : '';
  const filterType = document.getElementById('sf-type') ? document.getElementById('sf-type').value : '';
  const allMonth     = salesLog.filter(function(s){return s.month===curMonth;});
  const notCancelled = allMonth.filter(function(s){return s.dealType!=='ביטול';});
  // עסקאות אמיתיות — לא ביטול ולא השלמת תשלום
  const realDeals    = notCancelled.filter(function(s){return REV_ONLY_TYPES.indexOf(s.dealType)===-1;});
  // השלמות תשלום — מוסיפות למחזור בלבד
  const completions  = allMonth.filter(function(s){return REV_ONLY_TYPES.indexOf(s.dealType)>-1;});
  const completionRev= completions.reduce(function(a,s){return a+(+s.amount||0);},0);
  const filtered     = allMonth.filter(function(s){return (!filterRep||s.seller===filterRep)&&(!filterType||s.dealType===filterType);});

  const totalWD=workDaysInMonth(curMonth), passedWD=workDaysPassed(curMonth), remainWD=totalWD-passedWD;
  const totalDeals=realDeals.length;
  const totalRev=notCancelled.reduce(function(a,s){return a+(+s.amount||0);},0); // includes completions
  const cancelled=allMonth.filter(function(s){return s.dealType==='ביטול';});

  const gk=curMonth+'|SALES', sg=goals[gk]||{};
  const goalDeals=+sg.deals||0, goalRev=+sg.rev||0;
  const dealsLeft=goalDeals?Math.max(0,goalDeals-totalDeals):null;
  const revLeft=goalRev?Math.max(0,goalRev-totalRev):null;
  const dealsPct=goalDeals?Math.round(totalDeals/goalDeals*100):null;
  const revPct=goalRev?Math.round(totalRev/goalRev*100):null;
  const dealsPerDay=(remainWD>0&&dealsLeft)?(dealsLeft/remainWD).toFixed(1):null;
  const revPerDay=(remainWD>0&&revLeft)?Math.ceil(revLeft/remainWD):null;

  var tableRows='';

      const dtC=s.dealType==='תשלום מלא'?'dt-full':s.dealType==='שיריון תשלום'?'dt-reserve':s.dealType==='ביטול'?'dt-cancel':'dt-complete';

  var goalProgress='';

    if(dealsLeft!==null) goalProgress+='<div style="background:var(--amber-lt);padding:14px;border-top:1px solid var(--border)"><div class="kl" style="color:var(--amber)">עסקאות ליום לסגירת יעד</div><div style="font-size:24px;font-weight:900;color:var(--amber)">'+dealsPerDay+'</div><div class="ks">נותרו '+dealsLeft+' עסקאות</div></div>';

    '<div class="card">'+
      '<div class="card-hdr"><span class="card-title">מעקב יעדים — '+curMonth+'</span><span class="badge ba">עדכן יעדים</span></div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)">'+
        '<div style="background:var(--white);padding:16px"><div class="kl">ימי עבודה בחודש</div><div class="kv blue">'+totalWD+'</div><div class="ks">עברו '+passedWD+' | נותרו '+remainWD+'</div></div>'+
        '<div style="background:var(--white);padding:16px"><div class="kl">עסקאות עד היום</div><div class="kv '+dealColor+'">'+totalDeals+'</div><div class="ks">'+(goalDeals?'יעד: '+goalDeals+' | '+dealsPct+'%':'הגדר יעד למטה')+'</div></div>'+
        '<div style="background:var(--white);padding:16px"><div class="kl">מחזור עד היום</div><div class="kv '+revColor+'">'+fmt(totalRev)+'</div><div class="ks">'+(goalRev?'יעד: '+fmt(goalRev)+'₪ | '+revPct+'%':'הגדר יעד למטה')+'</div></div>'+
        '<div style="background:var(--white);padding:16px"><div class="kl">ביטולים חודש</div><div class="kv '+(cancelled.length>0?'red':'green')+'">'+cancelled.length+'</div><div class="ks">מתוך '+allMonth.length+' רשומות</div></div>'+
      '</div>'+
      goalProgress+
      '<div style="padding:14px 16px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap">'+
        '<div class="ig"><label>יעד עסקאות</label><input class="g-in" type="number" placeholder="0" value="'+(sg.deals||'')+'" min="0" onchange="saveSalesGoal(\'deals\',this.value)" style="width:120px"></div>'+
        '<div class="ig"><label>יעד מחזור ₪</label><input class="g-in" type="number" placeholder="0" value="'+(sg.rev||'')+'" min="0" onchange="saveSalesGoal(\'rev\',this.value)" style="width:150px"></div>'+
      '</div>'+
    '</div>'+

    '<div class="card">'+
      '<div class="card-hdr"><span class="card-title">סטטיסטיקות — '+curMonth+'</span></div>'+
      '<div style="padding:16px 20px">'+
        '<div style="font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">אמצעי תשלום</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">'+payChips+'</div>'+
        '<div style="font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">תזרים</div>'+
        '<div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">'+
          '<div style="background:var(--green-lt);border:1.5px solid var(--green-md);border-radius:8px;padding:10px 16px;text-align:center"><div style="font-size:11px;color:var(--green);font-weight:700">עסקאות תזרימיות</div><div style="font-size:22px;font-weight:900;color:var(--green)">'+tizDeals.length+' <span style="font-size:13px">('+tizPct+'%)</span></div></div>'+
          '<div style="background:var(--blue-lt);border:1.5px solid var(--blue-md);border-radius:8px;padding:10px 16px;text-align:center"><div style="font-size:11px;color:var(--blue);font-weight:700">סכום תזרימי</div><div style="font-size:22px;font-weight:900;color:var(--blue)">'+fmt(tizRev)+'₪</div><div style="font-size:11px;color:var(--blue)">'+(totalRev>0?Math.round(tizRev/totalRev*100):0)+'% מהמחזור</div></div>'+
        '</div>'+
        '<div style="font-size:11px;font-weight:800;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">סוגי תוכניות</div>'+
        '<div style="display:flex;flex-wrap:wrap;gap:8px">'+prodChips+'</div>'+
      '</div>'+
    '</div>'+
    '</div>'+

    '<div class="card"><div class="card-hdr"><span class="card-title">סיכום לפי נציג</span></div>'+
      '<div class="rep-summary-grid">'+(repCardsHtml||'<div class="empty-state">אין נתונים</div>')+'</div></div>'+

    '<div class="card">'+
      '<div style="display:flex;gap:20px;flex-wrap:wrap;padding:14px 22px;background:var(--s2);border-bottom:1px solid var(--border)">'+
        '<div class="total-item"><div class="total-lbl">עסקאות</div><div class="total-val" style="color:var(--blue)">'+totalDeals+'</div></div>'+
        '<div class="total-item"><div class="total-lbl">מחזור</div><div class="total-val" style="color:var(--green)">'+fmt(totalRev)+'₪</div></div>'+
        '<div class="total-item"><div class="total-lbl">ממוצע לעסקה</div><div class="total-val" style="color:var(--purple)">'+(totalDeals?fmt(Math.round(totalRev/totalDeals)):0)+'₪</div></div>'+
        '<div class="total-item"><div class="total-lbl">% תזרים</div><div class="total-val" style="color:var(--amber)">'+tizPct+'%</div></div>'+
        '<div class="total-item"><div class="total-lbl">ביטולים</div><div class="total-val" style="color:var(--red)">'+cancelled.length+'</div></div>'+
      '</div>'+
      '<div class="card-hdr"><span class="card-title">כל העסקאות — '+curMonth+'</span>'+
        '<div class="filter-bar">'+
          '<select class="fsel" id="sf-rep" onchange="renderAll()">'+repFilterOpts+'</select>'+
          '<select class="fsel" id="sf-type" onchange="renderAll()">'+typeFilterOpts+'</select>'+
        '</div>'+
      '</div>'+
      '<div class="tbl-wrap"><table>'+
        '<thead><tr><th>תאריך</th><th>לקוח</th><th>טלפון</th><th>נציג</th><th>תוכנית</th>'+
        '<th class="c">תשלום</th><th class="c">סוג עסקה</th><th class="c">סכום ₪</th>'+
        '<th>תאריך השלמה</th><th>הערות</th><th>סיבת ביטול</th><th></th></tr></thead>'+
        '<tbody>'+tableRows+'</tbody>'+
      '</table></div>'+
    '</div>'+

    '<div class="card">'+
      '<div class="card-hdr"><span class="card-title">הזנת עסקה חדשה</span><span class="badge bb">הזנה ידנית</span></div>'+
      '<div class="form-body">'+
        '<div style="display:grid;grid-template-columns:130px 1fr 130px 1fr 180px;gap:10px;margin-bottom:10px">'+

          '<div class="ig"><label>שם לקוח</label><input type="text" id="s-client" class="ifield" placeholder="שם מלא" style="text-align:right"></div>'+
          '<div class="ig"><label>טלפון</label><input type="text" id="s-phone" class="ifield" placeholder="05X..." style="text-align:right;font-size:13px"></div>'+
          '<div class="ig"><label>נציג</label><select id="s-seller" class="ifield fsel">'+repOpts+'</select></div>'+
          '<div class="ig"><label>תוכנית</label><select id="s-product" class="ifield fsel">'+prodOpts+'</select></div>'+
        '</div>'+
        '<div style="display:grid;grid-template-columns:160px 160px 130px 160px 1fr;gap:10px;margin-bottom:10px">'+
          '<div class="ig"><label>אמצעי תשלום</label><select id="s-pay" class="ifield fsel">'+payOpts+'</select></div>'+
          '<div class="ig"><label>סוג עסקה</label><select id="s-dtype" class="ifield fsel" onchange="toggleCancel()">'+typeOpts+'</select></div>'+
          '<div class="ig"><label>סכום ₪</label><input type="number" id="s-amount" class="ifield" placeholder="0" min="0"></div>'+
          '<div class="ig"><label>תאריך השלמה</label><input type="date" id="s-completion" class="ifield date-f"></div>'+
          '<div class="ig" id="cancel-wrap" style="display:none"><label>סיבת ביטול</label><input type="text" id="s-cancel" class="ifield" placeholder="סיבה..." style="text-align:right;font-size:13px"></div>'+
        '</div>'+
        '<div class="ig" style="margin-bottom:14px;max-width:600px"><label>הערות</label>'+
          '<input type="text" id="s-notes" class="ifield" placeholder="10 תשלומים, הערות..." style="text-align:right;font-size:13px;font-weight:500"></div>'+
        '<div class="form-actions">'+
          '<button class="btn-pri" onclick="saveSale()">הוסף עסקה ✓</button>'+

}

function toggleCancel() {
  const w=document.getElementById('cancel-wrap');
  const dt=document.getElementById('s-dtype');
  if(w&&dt) w.style.display=dt.value==='ביטול'?'':'none';
}

function saveSale() {
  const d=document.getElementById('s-date').value;
  const cl=document.getElementById('s-client').value.trim();
  if(!d||!cl){alert('תאריך ושם לקוח הם שדות חובה');return;}
  const dtype=document.getElementById('s-dtype').value;
  salesLog.push({id:Date.now(),month:curMonth,date:d,client:cl,
    phone:document.getElementById('s-phone').value.trim(),
    seller:document.getElementById('s-seller').value,
    product:document.getElementById('s-product').value,
    payMethod:document.getElementById('s-pay').value,
    dealType:dtype,
    amount:+document.getElementById('s-amount').value||0,
    completionDate:document.getElementById('s-completion').value,
    cancelReason:dtype==='ביטול'?document.getElementById('s-cancel').value.trim():'',
    notes:document.getElementById('s-notes').value.trim(),
  });
  persist();
  ['s-client','s-phone','s-amount','s-notes','s-cancel','s-completion'].forEach(function(id){var el=document.getElementById(id);if(el)el.value='';});
  var ok=document.getElementById('sale-ok');
  if(ok){ok.classList.add('show');setTimeout(function(){ok.classList.remove('show');},2500);}
  renderAll();
}

function delSale(id){salesLog=salesLog.filter(function(s){return s.id!==id;});persist();renderAll();}
function saveSalesGoal(field,val){var gk=curMonth+'|SALES';if(!goals[gk])goals[gk]={};goals[gk][field]=+val||0;persist();renderAll();}

// ── BONUSES ────────────────────────────────────────────────────────────
function renderBonuses() {
  const allB=bonusLog.filter(function(b){return b.month===curMonth;});
  const totalBonus=allB.reduce(function(a,b){return a+(+b.bonusAmount||0);},0);

  var repCardsHtml='';
  reps.forEach(function(rep){
    const rb=allB.filter(function(b){return b.rep===rep;});
    if(!rb.length){repCardsHtml+='<div class="rep-sum-card"><div class="rep-sum-name">'+rep+'</div><div style="color:var(--t3);font-size:12px;padding:8px 0">אין בונוסים</div></div>';return;}
    const rt=rb.reduce(function(a,b){return a+(+b.bonusAmount||0);},0);
    repCardsHtml+='<div class="rep-sum-card"><div class="rep-sum-name">'+rep+'</div>'+
      '<div class="rep-sum-row"><span class="rep-sum-lbl">בונוסים</span><span class="rep-sum-val">'+rb.length+'</span></div>'+
      '<div class="rep-sum-row"><span class="rep-sum-lbl">סה״כ</span><span class="rep-sum-val" style="color:var(--green)">'+fmt(rt)+'₪</span></div></div>';

      tableRows+='<tr>'+

        '<td style="font-size:12px">'+(b.bonusType||'')+'</td>'+

  }

  var repOpts='',typeOpts='',prodOpts='';
  reps.forEach(function(r){repOpts+='<option value="'+r+'">'+r+'</option>';});
  BONUS_TYPES.forEach(function(t){typeOpts+='<option value="'+t+'">'+t+'</option>';});
  PRODUCTS.forEach(function(p){prodOpts+='<option value="'+p+'">'+p+'</option>';});

      '<div class="rep-summary-grid">'+repCardsHtml+'</div></div>'+
    '<div class="card"><div class="card-hdr"><span class="card-title">בונוסים לפי סוג תחרות</span></div>'+
      '<div style="padding:16px 20px">'+(typeRowsHtml||'<div class="empty-state">אין נתונים</div>')+'</div></div>'+
    '</div>'+

    '<div class="card"><div class="card-hdr"><span class="card-title">רשימת בונוסים — '+curMonth+'</span><span class="badge bg">סה״כ: '+fmt(totalBonus)+'₪</span></div>'+
      '<div class="tbl-wrap"><table>'+
        '<thead><tr><th>תאריך</th><th>נציג</th><th>סוג תחרות</th><th>תוכנית</th>'+

function saveBonus(){
  const d=document.getElementById('b-date').value;
  if(!d){alert('בחר תאריך');return;}
  bonusLog.push({id:Date.now(),month:curMonth,date:d,
    rep:document.getElementById('b-rep').value,
    bonusType:document.getElementById('b-type').value,
    product:document.getElementById('b-product').value,
    dealAmount:+document.getElementById('b-deal').value||0,
    bonusAmount:+document.getElementById('b-bonus').value||0,
  });
  persist();
  ['b-deal','b-bonus'].forEach(function(id){document.getElementById(id).value='';});
  var ok=document.getElementById('bonus-ok');
  if(ok){ok.classList.add('show');setTimeout(function(){ok.classList.remove('show');},2500);}
  renderAll();
}

function delBonus(id){bonusLog=bonusLog.filter(function(b){return b.id!==id;});persist();renderAll();}

function saveGoal(gk,field,val){if(!goals[gk])goals[gk]={};goals[gk][field]=+val||0;persist();renderAll();}
function addBonusGoal(gk,rep,val){
  if(!goals[gk])goals[gk]={};
  goals[gk].bonus=+val||0;
  // Add to bonusLog so it appears in bonuses tab
  if(+val>0){
    // Remove previous goal bonus for this rep/month
    bonusLog=bonusLog.filter(function(b){return !(b.rep===rep&&b.month===curMonth&&b.isGoalBonus);});
    bonusLog.push({id:Date.now(),month:curMonth,date:today(),rep:rep,
      bonusType:'\u05d9\u05e2\u05d3 \u05d1\u05d5\u05e0\u05d5\u05e1',product:'',
      dealAmount:0,bonusAmount:+val,isGoalBonus:true});
  } else {
    bonusLog=bonusLog.filter(function(b){return !(b.rep===rep&&b.month===curMonth&&b.isGoalBonus);});
  }
  persist();renderAll();
}

// ── SALARY ───────────────────────────────────────────────────────────
function salTier(rev){
  for(var i=0;i<SAL_TIERS.length;i++){if(rev>=SAL_TIERS[i].mn&&rev<=SAL_TIERS[i].mx)return SAL_TIERS[i];}
  return SAL_TIERS[SAL_TIERS.length-1];
}
function salSetVat(rep,v){
  var k=curMonth+'|'+rep;
  if(!salConf[k])salConf[k]={};
  salConf[k].vat=v;persist();renderSalary();
}
function salSetRev(rep,v){
  var k=curMonth+'|'+rep;
  if(!salConf[k])salConf[k]={};
  salConf[k].rev=+v||0;persist();renderSalary();
}
function salCalc(rep){
  var k=curMonth+'|'+rep;
  var c=salConf[k]||{};
  var isPtor=(c.vat==='ptor');
  var rev=0;
  if(c.rev>0){rev=c.rev;}
  else{
    rev=salesLog.filter(function(s){return s.month===curMonth&&s.seller===rep&&s.dealType!=='\u05d1\u05d9\u05d8\u05d5\u05dc';})
               .reduce(function(a,s){return a+(+s.amount||0);},0);
    if(!rev)rev=entries.filter(function(e){return e.month===curMonth&&e.rep===rep;})
                       .reduce(function(a,e){return a+(+e.rev||0);},0);
  }
  var tier=salTier(rev);
  var base=isPtor?Math.round(rev/1.18):rev;
  var comm=Math.round(base*tier.pct/100);
  var bon=bonusLog.filter(function(b){return b.month===curMonth&&b.rep===rep;})
                  .reduce(function(a,b){return a+(+b.bonusAmount||0);},0);
  return{rev:rev,isPtor:isPtor,tier:tier,base:base,comm:comm,bon:bon,total:comm+bon};
}

// ── CONTEST ───────────────────────────────────────────────────────────
var contests = (function() {
  try { return JSON.parse(localStorage.getItem('c9') || '[]'); }
  catch(e) { return []; }
})();

function cPersist() {
  localStorage.setItem('c9', JSON.stringify(contests));
}

function getActiveContest() {
  for (var i = 0; i < contests.length; i++) {
    if (contests[i].month === curMonth && contests[i].active) {
      return contests[i];
    }
  }
  return null;
}

function contestCreate(name) {
  var pts = {};
  for (var i = 0; i < reps.length; i++) { pts[reps[i]] = 0; }
  var c = {
    id: Date.now(),
    name: name,
    month: curMonth,
    active: true,
    points: pts,
    log: []
  };
  contests.push(c);
  cPersist();
  renderContest();
}

function contestAdd(cid, rep, delta) {
  var c = null;
  for (var i = 0; i < contests.length; i++) {
    if (contests[i].id === cid) { c = contests[i]; break; }
  }
  if (!c) return;
  var d = parseInt(delta, 10) || 0;
  if (!c.points) c.points = {};
  var cur = parseInt(c.points[rep], 10) || 0;
  c.points[rep] = Math.max(0, cur + d);
  if (!c.log) c.log = [];
  c.log.push({ rep: rep, delta: d, date: today() });
  cPersist();
  renderContest();
}

function contestSet(cid, rep, val) {
  var c = null;
  for (var i = 0; i < contests.length; i++) {
    if (contests[i].id === cid) { c = contests[i]; break; }
  }
  if (!c) return;
  if (!c.points) c.points = {};
  c.points[rep] = Math.max(0, parseInt(val, 10) || 0);
  cPersist();
  renderContest();
}

function contestClose(cid) {
  if (!confirm('\u05dc\u05e1\u05d2\u05d5\u05e8 \u05d0\u05ea \u05d4\u05ea\u05d7\u05e8\u05d5\u05ea?')) return;
  for (var i = 0; i < contests.length; i++) {
    if (contests[i].id === cid) { contests[i].active = false; break; }
  }
  cPersist();
  renderContest();
}

function contestReset() {
  if (!confirm('\u05dc\u05d0\u05e4\u05e1 \u05d0\u05ea \u05db\u05dc \u05d4\u05ea\u05d7\u05e8\u05d5\u05d9\u05d5\u05ea? \u05d1\u05dc\u05ea\u05d9 \u05d4\u05e4\u05d9\u05db\u05d4!')) return;
  localStorage.removeItem('c9');
  contests = [];
  cPersist();
  renderContest();
}

function renderContest() {
  var c = getActiveContest();
  var html = '';

  // ── No active contest ──────────────────────────────────────────
  if (!c) {
    var past = [];
    for (var i = 0; i < contests.length; i++) {
      if (contests[i].month === curMonth && !contests[i].active) {
        past.push(contests[i]);
      }
    }

    html += '<div style="max-width:500px;margin:48px auto">';
    html += '<div class="card">';
    html += '<div class="card-hdr">';
    html += '<span class="card-title">\ud83c\udfab \u05ea\u05d7\u05e8\u05d5\u05ea \u05e0\u05e7\u05d5\u05d3\u05d5\u05ea \u2014 ' + curMonth + '</span>';
    html += '</div>';
    html += '<div class="form-body" style="text-align:center">';
    html += '<p style="font-size:14px;color:#5a6480;margin:0 0 20px">\u05e6\u05d5\u05e8 \u05ea\u05d7\u05e8\u05d5\u05ea \u05d7\u05d3\u05e9\u05d4 \u05dc' + curMonth + '</p>';
    html += '<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">';
    html += '<input id="nc-name" class="ifield" placeholder="\u05e9\u05dd \u05d4\u05ea\u05d7\u05e8\u05d5\u05ea..." style="max-width:220px;text-align:right">';
    html += '<button class="btn-pri" onclick="';
    html += 'var n=document.getElementById(\'nc-name\').value.trim();';
    html += 'if(!n)n=\'\u05ea\u05d7\u05e8\u05d5\u05ea ' + curMonth + '\';';
    html += 'contestCreate(n);">';
    html += '+ \u05e6\u05d5\u05e8</button>';
    html += '</div>';

    if (past.length > 0) {
      html += '<div style="margin-top:24px;border-top:1px solid #e2e6f0;padding-top:16px;text-align:right">';
      html += '<div style="font-size:12px;color:#9aa0b8;font-weight:700;margin-bottom:10px">\u05ea\u05d7\u05e8\u05d5\u05d9\u05d5\u05ea \u05e7\u05d5\u05d3\u05de\u05d5\u05ea:</div>';
      for (var i = 0; i < past.length; i++) {
        var p = past[i];
        var ppts = p.points || {};
        var sortedR = Object.keys(ppts).sort(function(a,b){ return (ppts[b]||0)-(ppts[a]||0); });
        var winner = (sortedR.length > 0 && ppts[sortedR[0]] > 0)
          ? sortedR[0] + ' (' + fmt(ppts[sortedR[0]]) + ' \u05e0\u05e7.)'
          : '\u05d0\u05d9\u05df \u05e0\u05e7\u05d5\u05d3\u05d5\u05ea';
        html += '<div style="font-size:13px;color:#5a6480;padding:6px 0;border-bottom:1px solid #f0f2f7">';
        html += '<strong>' + p.name + '</strong> \u2014 \ud83c\udfc6 ' + winner;
        html += '</div>';
      }
      html += '</div>';
    }

    html += '<div style="margin-top:20px">';
    html += '<button onclick="contestReset()" ';
    html += 'style="background:transparent;border:1px solid #fecaca;color:#dc2626;padding:7px 14px;';
    html += 'border-radius:8px;font-size:12px;cursor:pointer;font-family:Heebo,sans-serif">';
    html += '\u05d0\u05e4\u05e1 \u05d4\u05db\u05dc</button>';
    html += '</div>';

    html += '</div></div></div>';
    document.getElementById('view').innerHTML = html;
    return;
  }

  // ── Active contest ─────────────────────────────────────────────

  // Build sorted rankings
  var ranked = [];
  for (var i = 0; i < reps.length; i++) {
    ranked.push({ rep: reps[i], pts: parseInt(c.points[reps[i]], 10) || 0 });
  }
  ranked.sort(function(a, b) { return b.pts - a.pts; });

  var totalPts = 0;
  for (var i = 0; i < ranked.length; i++) { totalPts += ranked[i].pts; }

  var leader = ranked[0] && ranked[0].pts > 0 ? ranked[0] : null;

  // KPI strip
  html += '<div class="card">';
  html += '<div class="kpi-strip" style="grid-template-columns:repeat(3,1fr);border-bottom:1px solid var(--border)">';
  html += kpiCell('\ud83c\udfab ' + c.name, totalPts, '\u05e1\u05d4\u05f4\u05db \u05e0\u05e7\u05d5\u05d3\u05d5\u05ea', 'blue');
  html += kpiCell('\ud83e\udd47 \u05de\u05d5\u05d1\u05d9\u05dc',
    leader ? leader.rep : '\u2014',
    leader ? fmt(leader.pts) + ' \u05e0\u05e7.' : '',
    'green');
  html += kpiCell('\u05de\u05e9\u05ea\u05ea\u05e4\u05d9\u05dd',
    ranked.filter(function(d){ return d.pts > 0; }).length,
    '\u05e2\u05dd \u05e0\u05e7\u05d5\u05d3\u05d5\u05ea', 'amber');
  html += '</div></div>';

  // Main 2-col grid: leaderboard + entry
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';

  // ── LEFT: Leaderboard ──
  var medals = ['\ud83e\udd47', '\ud83e\udd48', '\ud83e\udd49'];
  var barColors = [
    'linear-gradient(90deg,#f59e0b,#fcd34d)',
    'linear-gradient(90deg,#6b7280,#d1d5db)',
    'linear-gradient(90deg,#92400e,#d97706)'
  ];
  var rowBgs = ['background:#fffbeb', 'background:#f9fafb', 'background:#fdf6ec'];

  var lbRows = '';
  for (var i = 0; i < ranked.length; i++) {
    var d = ranked[i];
    var pct = totalPts > 0 ? Math.round(d.pts / totalPts * 100) : 0;
    var rankCell = i < 3
      ? '<span style="font-size:26px">' + medals[i] + '</span>'
      : '<span style="font-size:14px;font-weight:700;color:#9aa0b8">' + (i+1) + '</span>';
    var bgStyle = i < 3 ? rowBgs[i] : '';
    var dimStyle = d.pts === 0 ? 'opacity:.35' : '';
    var barColor = i < 3 ? barColors[i] : '#e2e6f0';
    var ptsColor = i === 0 ? '#d97706' : i === 1 ? '#6b7280' : i === 2 ? '#92400e' : '#374151';

    lbRows += '<tr style="' + bgStyle + ';' + dimStyle + '">';
    lbRows += '<td style="text-align:center;padding:12px 8px;width:56px">' + rankCell + '</td>';
    lbRows += '<td class="rname">' + d.rep + '</td>';
    lbRows += '<td style="padding:10px 14px">';
    lbRows += '<div style="display:flex;align-items:center;gap:10px">';
    lbRows += '<div style="flex:1;height:12px;background:#f0f2f7;border-radius:6px;overflow:hidden">';
    lbRows += '<div style="width:' + pct + '%;height:100%;background:' + barColor + ';border-radius:6px;transition:width .4s"></div>';
    lbRows += '</div>';
    lbRows += '<span style="font-weight:900;font-size:20px;min-width:50px;color:' + (d.pts > 0 ? ptsColor : '#9aa0b8') + '">' + fmt(d.pts) + '</span>';
    lbRows += '<span style="font-size:11px;color:#9aa0b8;min-width:34px">' + (pct ? pct + '%' : '') + '</span>';
    lbRows += '</div></td></tr>';
  }

  html += '<div class="card">';
  html += '<div class="card-hdr">';
  html += '<span class="card-title">\ud83c\udfc6 \u05dc\u05d5\u05d7 \u05de\u05e7\u05d5\u05de\u05d5\u05ea</span>';
  html += '<span class="badge bb">' + totalPts + ' \u05e0\u05e7\u05d5\u05d3\u05d5\u05ea</span>';
  html += '</div>';
  html += '<div class="tbl-wrap"><table>';
  html += '<thead><tr>';
  html += '<th class="c" style="width:56px">\u05de\u05e7\u05d5\u05dd</th>';
  html += '<th>\u05e0\u05e6\u05d9\u05d2</th>';
  html += '<th>\u05e0\u05e7\u05d5\u05d3\u05d5\u05ea</th>';
  html += '</tr></thead>';
  html += '<tbody>' + lbRows + '</tbody>';
  html += '</table></div></div>';

  // ── RIGHT: Entry panel ──
  var entryRows = '';
  for (var i = 0; i < ranked.length; i++) {
    var d = ranked[i];
    var rep = d.rep;
    var pts = d.pts;
    var rank = i < 3 ? medals[i] : '#' + (i+1);
    // Use rep name as safe ID (replace spaces with underscores)
    var safeId = 'inp_' + rep.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '');

    entryRows += '<div style="display:flex;align-items:center;justify-content:space-between;';
    entryRows += 'padding:11px 16px;border-bottom:1px solid #f0f2f7">';

    entryRows += '<div style="display:flex;align-items:center;gap:8px">';
    entryRows += '<span style="font-size:' + (i < 3 ? '20' : '13') + 'px;';
    entryRows += (i >= 3 ? 'color:#9aa0b8;font-weight:700;' : '') + '">' + rank + '</span>';
    entryRows += '<span style="font-weight:800;font-size:14px">' + rep + '</span>';
    entryRows += '</div>';

    entryRows += '<div style="display:flex;align-items:center;gap:6px">';
    // minus
    entryRows += '<button onclick="contestAdd(' + c.id + ',\'' + rep + '\',-(parseInt(document.getElementById(\'' + safeId + '\').value,10)||1))" ';
    entryRows += 'style="width:32px;height:32px;border-radius:8px;border:1.5px solid #e2e6f0;';
    entryRows += 'background:#f7f8fc;font-size:20px;font-weight:800;cursor:pointer;line-height:1;font-family:Heebo,sans-serif">\u2212</button>';
    // delta input
    entryRows += '<input id="' + safeId + '" type="number" value="1" min="1" ';
    entryRows += 'style="width:52px;text-align:center;border:1.5px solid #e2e6f0;border-radius:8px;';
    entryRows += 'padding:6px 4px;font-size:13px;font-weight:700;font-family:Heebo,sans-serif;background:#f7f8fc">';
    // plus
    entryRows += '<button onclick="contestAdd(' + c.id + ',\'' + rep + '\',parseInt(document.getElementById(\'' + safeId + '\').value,10)||1)" ';
    entryRows += 'style="width:32px;height:32px;border-radius:8px;border:1.5px solid #bfcfff;';
    entryRows += 'background:#eff4ff;color:#2563eb;font-size:20px;font-weight:800;cursor:pointer;line-height:1;font-family:Heebo,sans-serif">+</button>';
    // current points display
    entryRows += '<span style="font-weight:900;font-size:20px;color:#2563eb;min-width:50px;text-align:center">' + fmt(pts) + '</span>';
    // manual set
    entryRows += '<input type="number" placeholder="\u05e2\u05e8\u05d5\u05da" ';
    entryRows += 'onchange="contestSet(' + c.id + ',\'' + rep + '\',this.value);this.value=\'\';" ';
    entryRows += 'style="width:58px;text-align:center;border:1.5px solid #e2e6f0;border-radius:8px;';
    entryRows += 'padding:5px 4px;font-size:12px;font-family:Heebo,sans-serif;color:#5a6480">';
    entryRows += '</div></div>';
  }

  html += '<div class="card">';
  html += '<div class="card-hdr">';
  html += '<span class="card-title">\u05d4\u05d6\u05e0\u05ea \u05e0\u05e7\u05d5\u05d3\u05d5\u05ea</span>';
  html += '<span class="badge bg">\u05e2\u05d3\u05db\u05df \u05d9\u05d3\u05e0\u05d9\u05ea \u05d1\u05e1\u05d5\u05e3 \u05d9\u05d5\u05dd</span>';
  html += '</div>';
  html += entryRows;
  html += '<div style="padding:10px 16px;font-size:11px;color:#9aa0b8;border-top:1px solid #f0f2f7">';
  html += '\u05d8\u05d9\u05e4: \u05e9\u05e0\u05d4 \u05d0\u05ea \u05d4\u05de\u05e1\u05e4\u05e8 \u05dc\u05e4\u05e0\u05d9 +/\u2212 ';
  html += '\u05d0\u05d5 \u05d4\u05e9\u05ea\u05de\u05e9 \u05d1\u05e9\u05d3\u05d4 \u05e2\u05e8\u05d5\u05da \u05dc\u05e7\u05d1\u05d9\u05e2\u05ea \u05e1\u05db\u05d5\u05dd';
  html += '</div>';
  html += '</div>';

  html += '</div>'; // end main grid

  // ── History log ──
  if (c.log && c.log.length > 0) {
    var logItems = c.log.slice().reverse().slice(0, 20);
    var logRows = '';
    for (var i = 0; i < logItems.length; i++) {
      var h = logItems[i];
      logRows += '<tr>';
      logRows += '<td style="font-size:12px;color:#9aa0b8">' + (h.date || '') + '</td>';
      logRows += '<td class="rname">' + h.rep + '</td>';
      logRows += '<td class="c" style="font-weight:800;color:' + (h.delta > 0 ? '#059669' : '#dc2626') + '">';
      logRows += (h.delta > 0 ? '+' : '') + h.delta + ' \u05e0\u05e7.';
      logRows += '</td></tr>';
    }
    html += '<div class="card">';
    html += '<div class="card-hdr">';
    html += '<span class="card-title">\u05d4\u05d9\u05e1\u05d8\u05d5\u05e8\u05d9\u05d9\u05ea \u05e2\u05d3\u05db\u05d5\u05e0\u05d9\u05dd</span>';
    html += '<span class="badge ba">' + c.log.length + ' \u05e4\u05e2\u05d5\u05dc\u05d5\u05ea</span>';
    html += '</div>';
    html += '<div class="tbl-wrap"><table>';
    html += '<thead><tr>';
    html += '<th>\u05ea\u05d0\u05e8\u05d9\u05da</th>';
    html += '<th>\u05e0\u05e6\u05d9\u05d2</th>';
    html += '<th class="c">\u05e9\u05d9\u05e0\u05d5\u05d9</th>';
    html += '</tr></thead>';
    html += '<tbody>' + logRows + '</tbody>';
    html += '</table></div></div>';
  }

  // ── Bottom buttons ──
  html += '<div style="margin-top:4px;display:flex;gap:8px">';
  html += '<button onclick="contestClose(' + c.id + ')" ';
  html += 'style="background:transparent;border:1px solid #e2e6f0;color:#9aa0b8;padding:7px 14px;';
  html += 'border-radius:8px;font-size:12px;cursor:pointer;font-family:Heebo,sans-serif">';
  html += '\u05e1\u05d2\u05d5\u05e8 \u05ea\u05d7\u05e8\u05d5\u05ea</button>';
  html += '<button onclick="contestReset()" ';
  html += 'style="background:transparent;border:1px solid #fecaca;color:#dc2626;padding:7px 14px;';
  html += 'border-radius:8px;font-size:12px;cursor:pointer;font-family:Heebo,sans-serif">';
  html += '\u05d0\u05e4\u05e1 \u05d4\u05db\u05dc</button>';
  html += '</div>';

  document.getElementById('view').innerHTML = html;
}


function renderDebtors(){
  var tod=today();
  var pending=debtors.filter(function(x){return x.status!=='done';});
  var done=debtors.filter(function(x){return x.status==='done';});
  var overdue=pending.filter(function(x){return x.dueDate<tod;});
  var soon=pending.filter(function(x){return x.dueDate>=tod&&x.dueDate<=addDaysD(tod,30);});
  var future=pending.filter(function(x){return x.dueDate>addDaysD(tod,30);});

  function makeRow(item){
    var isOver=item.dueDate<tod&&item.status!=='done';
    var isDone=item.status==='done';
    var bg=isDone?'opacity:.45':isOver?'background:#fef8f8':'';
    var daysDiff=Math.round((new Date(item.dueDate)-new Date(tod))/(1000*60*60*24));
    var dueLabel=isDone?'\u2713':isOver?'\u05d1\u05e4\u05d9\u05d2\u05d5\u05e8 '+Math.abs(daysDiff)+'\u05d9\u05de':daysDiff===0?'\u05d4\u05d9\u05d5\u05dd!':'\u05e2\u05d5\u05d3 '+daysDiff+'\u05d9\u05de';
    var dueColor=isDone?'#059669':isOver?'#dc2626':daysDiff<=7?'#d97706':'#5a6480';
    return '<tr style="'+bg+'">'+
      '<td style="font-weight:700">'+item.name+'</td>'+
      '<td style="font-size:12px">'+item.phone+'</td>'+
      '<td class="c" style="font-weight:700;color:'+(item.amount>0?'#2563eb':'#9aa0b8')+'">'+(item.amount?'\u20aa'+fmt(item.amount):'')+'</td>'+
      '<td class="c">'+item.dueDate+'</td>'+
      '<td class="c" style="color:'+dueColor+';font-weight:700;font-size:12px">'+dueLabel+'</td>'+
      '<td><span style="font-size:11px;padding:2px 7px;border-radius:8px;background:#eff4ff;color:#2563eb">'+item.method+'</span></td>'+
      '<td style="font-size:12px;color:#5a6480;max-width:160px;overflow:hidden;text-overflow:ellipsis">'+item.notes+'</td>'+
      '<td class="c">'+
        '<button onclick="markDebtorDone('+item.id+')" style="padding:4px 9px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:Heebo,sans-serif;border:1.5px solid '+(isDone?'#a7f3d0':'#e2e6f0')+';background:'+(isDone?'#ecfdf5':'transparent')+';color:'+(isDone?'#059669':'#9aa0b8')+'">'+(isDone?'\u2713 \u05e9\u05d5\u05dc\u05dd':'\u05e1\u05de\u05df')+'</button>'+
        ' <button class="del" onclick="delDebtor('+item.id+')">\u05de\u05d7\u05e7</button>'+
      '</td></tr>';
  }

  var rows='';
  function grpHdr(bg,color,label){return '<tr><td colspan="8" style="background:'+bg+';color:'+color+';font-weight:800;font-size:12px;padding:8px 14px">'+label+'</td></tr>';}
  if(overdue.length){rows+=grpHdr('#fef2f2','#dc2626','\u26a0\ufe0f \u05d1\u05e4\u05d9\u05d2\u05d5\u05e8 ('+overdue.length+')');overdue.forEach(function(x){rows+=makeRow(x);});}
  if(soon.length){rows+=grpHdr('#fffbeb','#d97706','\u05e7\u05e8\u05d5\u05d1\u05d9\u05dd - 30 \u05d9\u05de\u05d9\u05dd ('+soon.length+')');soon.forEach(function(x){rows+=makeRow(x);});}
  if(future.length){rows+=grpHdr('#f7f8fc','#5a6480','\u05e2\u05ea\u05d9\u05d3\u05d9 ('+future.length+')');future.forEach(function(x){rows+=makeRow(x);});}
  if(done.length){rows+=grpHdr('#ecfdf5','#059669','\u2713 \u05e9\u05d5\u05dc\u05dd ('+done.length+')');done.forEach(function(x){rows+=makeRow(x);});}
  if(!rows)rows='<tr><td colspan="8"><div class="empty-state"><strong>\u05d0\u05d9\u05df \u05e8\u05e9\u05d5\u05de\u05d5\u05ea</strong></div></td></tr>';

  var totalOwed=pending.reduce(function(a,x){return a+(+x.amount||0);},0);
  var methods=['\u05db\u05e8\u05d8\u05d9\u05e1 \u05d0\u05e9\u05e8\u05d0\u05d9','\u05e4\u05d9\u05d9\u05de\u05e0\u05d8 \u05d1\u05e7\u05dc\u05d9\u05e7','\u05d4\u05e2\u05d1\u05e8\u05d4 \u05d1\u05e0\u05e7\u05d0\u05d9\u05ea','\u05d1\u05d9\u05d8','\u05d4\u05d5\u05e7 \u05d0\u05e9\u05e8\u05d0\u05d9','\u05d0\u05d7\u05e8'];
  var methOpts='';methods.forEach(function(m){methOpts+='<option value="'+m+'">'+m+'</option>';});

  var html='';
  html+='<div class="card"><div class="kpi-strip" style="grid-template-columns:repeat(4,1fr);border-bottom:1px solid var(--border)">';
  html+=kpiCell('\u26a0\ufe0f \u05d1\u05e4\u05d9\u05d2\u05d5\u05e8',overdue.length,overdue.length>0?'\u05d3\u05d5\u05e8\u05e9 \u05d8\u05d9\u05e4\u05d5\u05dc!':'','red');
  html+=kpiCell('\u05e1\u05d4\u05f4\u05db \u05d7\u05d5\u05d1 \u05e4\u05ea\u05d5\u05d7','\u20aa'+fmt(totalOwed),'','amber');
  html+=kpiCell('\u05d1\u05e1\u05de\u05d5\u05da (30\u05d9\u05de)',soon.length,'','blue');
  html+=kpiCell('\u05e9\u05d5\u05dc\u05dd',done.length,'','green');
  html+='</div></div>';

  html+='<div class="card"><div class="card-hdr"><span class="card-title">\u05e8\u05e9\u05d9\u05de\u05ea \u05d7\u05d9\u05d9\u05d1\u05d9\u05dd</span>'+
    '<span class="badge ba">'+debtors.length+' \u05e8\u05e9\u05d5\u05de\u05d5\u05ea</span></div>'+
    '<div class="tbl-wrap"><table><thead><tr>'+
    '<th>\u05e9\u05dd \u05dc\u05e7\u05d5\u05d7</th><th>\u05d8\u05dc\u05e4\u05d5\u05df</th>'+
    '<th class="c">\u05e1\u05db\u05d5\u05dd \u20aa</th><th class="c">\u05ea\u05d0\u05e8\u05d9\u05da \u05d2\u05d1\u05d9\u05d9\u05d4</th>'+
    '<th class="c">\u05e1\u05d8\u05d8\u05d5\u05e1</th><th>\u05d0\u05de\u05e6\u05e2\u05d9</th>'+
    '<th>\u05d4\u05e2\u05e8\u05d5\u05ea</th><th class="c">\u05e4\u05e2\u05d5\u05dc\u05d5\u05ea</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div></div>';

  html+='<div class="card"><div class="card-hdr"><span class="card-title">+ \u05d4\u05d5\u05e1\u05e3 \u05d7\u05d9\u05d9\u05d1</span>'+
    '<span class="badge bg">\u05d4\u05d6\u05e0\u05d4 \u05d9\u05d3\u05e0\u05d9\u05ea</span></div>'+
    '<div class="form-body">'+
      '<div style="display:grid;grid-template-columns:1fr 130px 120px 150px;gap:10px;margin-bottom:10px">'+
        '<div class="ig"><label>\u05e9\u05dd \u05dc\u05e7\u05d5\u05d7</label><input type="text" id="db-name" class="ifield" placeholder="\u05e9\u05dd \u05de\u05dc\u05d0..." style="text-align:right"></div>'+
        '<div class="ig"><label>\u05d8\u05dc\u05e4\u05d5\u05df</label><input type="text" id="db-phone" class="ifield" placeholder="05X..." style="text-align:right;font-size:13px"></div>'+
        '<div class="ig"><label>\u05e1\u05db\u05d5\u05dd \u20aa</label><input type="number" id="db-amount" class="ifield" placeholder="0" min="0"></div>'+
        '<div class="ig"><label>\u05ea\u05d0\u05e8\u05d9\u05da \u05d2\u05d1\u05d9\u05d9\u05d4</label><input type="date" id="db-date" class="ifield date-f"></div>'+
      '</div>'+
      '<div style="display:grid;grid-template-columns:180px 1fr;gap:10px;margin-bottom:10px">'+
        '<div class="ig"><label>\u05d0\u05de\u05e6\u05e2\u05d9 \u05ea\u05e9\u05dc\u05d5\u05dd</label><select id="db-method" class="ifield fsel">'+methOpts+'</select></div>'+
        '<div class="ig"><label>\u05d4\u05e2\u05e8\u05d5\u05ea</label><input type="text" id="db-notes" class="ifield" placeholder="\u05db\u05d9\u05e6\u05d3 \u05e1\u05d5\u05db\u05dd, \u05de\u05e1\u05e4\u05e8 \u05ea\u05e9\u05dc\u05d5\u05de\u05d9\u05dd..." style="text-align:right;font-size:13px"></div>'+
      '</div>'+
      '<div class="form-actions">'+
        '<button class="btn-pri" onclick="saveDebtor()">\u05d4\u05d5\u05e1\u05e3 \u2713</button>'+
        '<span class="ok-msg" id="db-ok">\u2713 \u05e0\u05e9\u05de\u05e8!</span>'+
      '</div>'+
    '</div></div>';
  document.getElementById('view').innerHTML=html;
}



</script>
</body>
</html>
